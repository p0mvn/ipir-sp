name: Inspiring Crate

on:
  pull_request:
    paths:
      - ".github/workflows/inspiring-crate.yml"
      - "inspiring/Cargo.toml"
      - "inspiring/Cargo.lock"
      - "inspiring/rust-toolchain.toml"
      - "inspiring/.cargo/**"
      - "inspiring/src/**"
      - "inspiring/tests/**"
      - "inspiring/benches/**"
      - "inspiring/bench/**"
      - "inspiring/examples/**"
      - "inspiring/fuzz/**"
      - "inspiring/SECURITY.md"
  push:
    paths:
      - ".github/workflows/inspiring-crate.yml"
      - "inspiring/Cargo.toml"
      - "inspiring/Cargo.lock"
      - "inspiring/rust-toolchain.toml"
      - "inspiring/.cargo/**"
      - "inspiring/src/**"
      - "inspiring/tests/**"
      - "inspiring/benches/**"
      - "inspiring/bench/**"
      - "inspiring/examples/**"
      - "inspiring/fuzz/**"
      - "inspiring/SECURITY.md"

jobs:
  portable:
    name: Portable compile checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: inspiring

    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain via rust-toolchain.toml
        # Setting up rustup such that `cargo` invocations honour
        # rust-toolchain.toml automatically.
        run: |
          rustup show active-toolchain || rustup toolchain install --profile minimal 1.89.0
          rustup component add rustfmt clippy --toolchain 1.89.0

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            inspiring/target/
          key: ${{ runner.os }}-cargo-inspiring-${{ hashFiles('inspiring/Cargo.lock', 'inspiring/Cargo.toml', 'inspiring/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-inspiring-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo doc
        # Build docs to catch broken intra-doc links early. `--no-deps` so we
        # don't try to docgen spiral-rs.
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo check
        run: cargo check --all-targets --all-features

  tests:
    name: Tests and benches
    runs-on: [self-hosted, Linux, X64, avx512]

    defaults:
      run:
        working-directory: inspiring

    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify CPU has AVX-512
        run: |
          if ! grep -q avx512f /proc/cpuinfo; then
            echo "::error::This runner lacks AVX-512; spiral-rs tests cannot run."
            exit 1
          fi
          echo "AVX-512 detected on $(uname -m)"

      - name: Install Rust toolchain via rust-toolchain.toml
        # Setting up rustup such that `cargo` invocations honour
        # rust-toolchain.toml automatically.
        run: |
          rustup show active-toolchain || rustup toolchain install --profile minimal 1.89.0
          rustup component add rustfmt clippy --toolchain 1.89.0

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            inspiring/target/
          key: ${{ runner.os }}-cargo-inspiring-tests-${{ hashFiles('inspiring/Cargo.lock', 'inspiring/Cargo.toml', 'inspiring/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-inspiring-tests-

      - name: cargo test
        run: cargo test --all-features --no-fail-fast

      - name: cargo bench --no-run
        run: cargo bench --bench pack --no-run

      - name: Upload benchmark report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: inspiring-benchmark-report
          path: inspiring/bench/REPORT.md
